<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support — Devgna Vyas</title>
    <meta name="description" content="Support Devgna Vyas via GitHub Sponsors or Chai4Me.">
    <link rel="canonical" href="https://vyas-devgna.github.io/Portfolio/donate.html">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&family=Lora&display=swap" rel="stylesheet">
    <link id="app-style" rel="stylesheet" href="css/style.css">
</head>
<body class="donate-page">
    <canvas id="sakura-canvas" aria-hidden="true"></canvas>

    <a href="index.html" class="btn-brutal donate-back">← Portfolio</a>

    <main class="donate-page-main">
        <p class="section-label">Support</p>
        <h1 class="section-heading">Thank you.</h1>
        <p class="contact-text">GitHub Sponsors or a chai on Chai4Me — every bit helps.</p>

        <div class="support-embed-row" style="margin: 2rem 0;">
            <div class="support-sponsor-card-wrap">
                <iframe src="https://github.com/sponsors/vyas-devgna/card" title="Sponsor vyas-devgna" height="225" width="600" style="border: 0;"></iframe>
            </div>
            <a class="chai-support-link" href="https://chai4.me/vyasdevgna" target="_blank" rel="noopener noreferrer" title="Support vyasdevgna on Chai4Me"><img src="images/chai4me-support.png" alt="Chai4Me @vyasdevgna" width="180" height="56" /></a>
        </div>

        <p class="section-label" style="margin-top: 2.5rem;">Message</p>
        <form id="contact-form" action="https://formspree.io/f/xvzylwel" method="POST" class="brutal-form reveal">
            <div class="form-group">
                <label for="contact-name">Name</label>
                <input type="text" name="name" id="contact-name" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label for="contact-email-input">Email</label>
                <input type="email" name="_replyto" id="contact-email-input" placeholder="you@email.com" required>
            </div>
            <div class="form-group">
                <label for="contact-message">Message</label>
                <textarea name="message" id="contact-message" placeholder="Optional note…" required rows="3"></textarea>
            </div>
            <button type="submit" class="btn-brutal btn-brutal-accent">Send</button>
            <p id="form-status" class="form-status"></p>
        </form>
    </main>

    <footer class="footer" role="contentinfo">
        <div class="container">
            <p class="footer-text">Devgna Vyas · <a href="index.html" style="color: inherit; text-decoration: underline;">Portfolio</a></p>
        </div>
    </footer>

    <script>
      (function () {
        var v = Date.now();
        document.getElementById('app-style').href = 'css/style.css?v=' + v;
        ['js/main.js', 'js/sakura.js'].forEach(function (s) {
          var el = document.createElement('script');
          el.src = s + '?v=' + v;
          document.body.appendChild(el);
        });
      })();
    </script>
</body>
</html>
