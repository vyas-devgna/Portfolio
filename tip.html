<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tip via UPI</title>
  <meta name="description" content="Send a UPI tip — scan the QR or open your UPI app." />
  <meta name="robots" content="noindex" />
  <link rel="icon" href="images/upi-logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f9f8f6;
      --card: #ffffff;
      --ink: #111111;
      --muted: #5c5853;
      --line: #111111;
      --accent: #097939;
      --accent-hover: #066b31;
      --shadow: 4px 4px 0 #111111;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
      min-height: 100dvh;
      line-height: 1.5;
    }

    .wrap {
      width: min(22rem, 100%);
      margin: 0 auto;
      padding: 1.5rem 1rem 2.5rem;
    }

    .back {
      display: inline-block;
      margin-bottom: 1.25rem;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
    }
    .back:hover { color: var(--ink); }

    .upi-logo {
      display: block;
      width: auto;
      height: auto;
      max-width: min(10rem, 72vw);
      margin: 0 auto 1.25rem;
    }

    .card {
      background: var(--card);
      border: 2px solid var(--line);
      box-shadow: var(--shadow);
    }

    .card-head {
      padding: 1.25rem 1.25rem 0.5rem;
      text-align: center;
      border-bottom: 2px dashed rgba(17, 17, 17, 0.15);
    }

    .card-head h1 {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .card-head p {
      margin-top: 0.35rem;
      font-size: 0.875rem;
      color: var(--muted);
    }

    .card-body {
      padding: 1.25rem;
    }

    .qr-wrap {
      text-align: center;
      margin-bottom: 1.25rem;
    }

    .qr-wrap p {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .qr-box {
      display: inline-block;
      padding: 0.65rem;
      background: #fff;
      border: 2px solid var(--line);
      line-height: 0;
    }

    .qr-box img {
      display: block;
      width: min(240px, calc(100vw - 4.5rem));
      height: auto;
    }

    .qr-fallback {
      display: none;
      font-size: 0.875rem;
      color: #a33;
      margin-top: 0.5rem;
    }
    .qr-fallback.show { display: block; }

    .amounts {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
      margin-bottom: 0.75rem;
    }

    .chip {
      padding: 0.45rem 0.8rem;
      font: inherit;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--ink);
      background: var(--bg);
      border: 2px solid var(--line);
    }
    .chip.on {
      background: var(--ink);
      color: #fff;
    }

    .amount-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .amount-row input {
      flex: 1;
      min-width: 0;
      padding: 0.6rem 0.75rem;
      font: inherit;
      font-size: 1rem;
      border: 2px solid var(--line);
      background: #fff;
    }
    .amount-row input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    .amount-row span {
      display: flex;
      align-items: center;
      font-size: 0.8125rem;
      font-weight: 700;
      color: var(--muted);
    }

    .tip-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 3.1rem;
      padding: 0.85rem 1rem;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      color: #fff;
      background: var(--accent);
      border: 2px solid var(--line);
      box-shadow: 3px 3px 0 var(--line);
      transition: transform 0.1s ease, background 0.15s ease;
    }
    .tip-btn:hover {
      background: var(--accent-hover);
      transform: translate(1px, 1px);
      box-shadow: 2px 2px 0 var(--line);
    }

    .card-foot {
      padding: 0.85rem 1.25rem;
      font-size: 0.8125rem;
      color: var(--muted);
      text-align: center;
      border-top: 2px dashed rgba(17, 17, 17, 0.15);
    }
    .card-foot strong { color: var(--ink); }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html#support">← Back</a>

    <img class="upi-logo" src="images/upi-logo.png" width="1165" height="414" alt="UPI" />

    <main class="card">
      <div class="card-head">
        <h1>Send a tip</h1>
        <p>Scan the QR or tap the button on your phone</p>
      </div>

      <div class="card-body">
        <div class="qr-wrap">
          <p>Scan to pay</p>
          <div class="qr-box">
            <img id="qr" width="240" height="240" alt="UPI payment QR code" />
          </div>
          <p id="qr-err" class="qr-fallback">QR could not load. Use the button below on your phone.</p>
        </div>

        <div class="amounts" id="presets" aria-label="Tip amount">
          <button type="button" class="chip on" data-amt="">Any</button>
          <button type="button" class="chip" data-amt="50">₹50</button>
          <button type="button" class="chip" data-amt="100">₹100</button>
          <button type="button" class="chip" data-amt="200">₹200</button>
          <button type="button" class="chip" data-amt="500">₹500</button>
        </div>
        <div class="amount-row">
          <input type="number" id="amount" min="1" max="100000" step="1" placeholder="Other (INR)" inputmode="decimal" aria-label="Custom amount in rupees" />
          <span>INR</span>
        </div>

        <a class="tip-btn" id="tip-btn" href="#">Tip via UPI app</a>
      </div>

      <p class="card-foot">Payment note: <strong>TIP</strong></p>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script>
    (function () {
      var cfg = {
        vpa: "devgnavyas@slc",
        payeeName: "Devgna Vyas",
        defaultNote: "TIP"
      };
      var presetAmt = "";

      function buildParams(amount) {
        var p = {
          pa: cfg.vpa,
          pn: cfg.payeeName,
          tn: cfg.defaultNote,
          cu: "INR"
        };
        var raw = amount != null ? String(amount).trim() : "";
        var n = parseFloat(raw);
        if (raw && !isNaN(n) && n > 0) {
          p.am = n.toFixed(2);
        }
        return p;
      }

      function toQuery(params) {
        return Object.keys(params)
          .filter(function (k) { return params[k] != null && params[k] !== ""; })
          .map(function (k) { return k + "=" + encodeURIComponent(String(params[k])); })
          .join("&");
      }

      function upiUri(amount) {
        return "upi://pay?" + toQuery(buildParams(amount));
      }

      function currentAmount() {
        var v = document.getElementById("amount").value.trim();
        return v || presetAmt;
      }

      function syncLinks() {
        document.getElementById("tip-btn").href = upiUri(currentAmount());
      }

      function renderQr() {
        var img = document.getElementById("qr");
        var err = document.getElementById("qr-err");
        var payload = upiUri(currentAmount());
        var size = Math.min(280, Math.max(200, window.innerWidth - 80));

        function fail() {
          err.classList.add("show");
        }

        if (!window.QRCode) {
          fail();
          return;
        }

        QRCode.toDataURL(payload, {
          width: size,
          margin: 2,
          errorCorrectionLevel: "M",
          color: { dark: "#111111", light: "#ffffff" }
        }, function (e, url) {
          if (e) {
            fail();
            return;
          }
          err.classList.remove("show");
          img.src = url;
          img.width = size;
          img.height = size;
        });
      }

      function bind() {
        document.querySelectorAll(".chip").forEach(function (el) {
          el.addEventListener("click", function () {
            presetAmt = el.getAttribute("data-amt") || "";
            document.getElementById("amount").value = "";
            document.querySelectorAll(".chip").forEach(function (c) { c.classList.remove("on"); });
            el.classList.add("on");
            syncLinks();
            renderQr();
          });
        });

        document.getElementById("amount").addEventListener("input", function () {
          presetAmt = "";
          document.querySelectorAll(".chip").forEach(function (c) { c.classList.remove("on"); });
          syncLinks();
          renderQr();
        });

        syncLinks();
        renderQr();
        window.addEventListener("resize", renderQr);
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", bind);
      } else {
        bind();
      }
    })();
  </script>
</body>
</html>
