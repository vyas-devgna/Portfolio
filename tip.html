<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tip via UPI</title>
  <meta name="description" content="Send a tip — UPI scan or pay on Razorpay." />
  <meta name="robots" content="noindex" />
  <link rel="icon" href="images/upi-logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f9f8f6;
      --card: #ffffff;
      --ink: #111111;
      --muted: #5c5853;
      --line: #111111;
      --accent: #097939;
      --accent-hover: #066b31;
      --accent-soft: rgba(9, 121, 57, 0.08);
      --upi-orange: #f07a28;
      --shadow: 4px 4px 0 #111111;
      --page-pad: clamp(1rem, 4vw, 2rem);
      --split-bp: 52rem;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
      min-height: 100dvh;
      line-height: 1.5;
    }

    .page {
      width: min(100%, calc(var(--split-bp) + var(--page-pad) * 2));
      margin: 0 auto;
      padding: var(--page-pad);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: clamp(1rem, 3vw, 1.5rem);
      flex-wrap: wrap;
    }

    .back {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      white-space: nowrap;
    }
    .back:hover { color: var(--ink); }

    .upi-logo {
      display: block;
      width: auto;
      height: auto;
      max-width: min(9.5rem, 42vw);
      margin-left: auto;
    }

    .card {
      background: var(--card);
      border: 2px solid var(--line);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-head {
      padding: clamp(1.15rem, 3vw, 1.5rem) clamp(1.25rem, 4vw, 2rem);
      text-align: center;
      border-bottom: 2px dashed rgba(17, 17, 17, 0.14);
      background: linear-gradient(180deg, var(--accent-soft) 0%, transparent 100%);
    }

    .card-head h1 {
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(1.35rem, 3.5vw, 1.75rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .card-head p {
      margin-top: 0.4rem;
      font-size: clamp(0.8125rem, 2vw, 0.9375rem);
      color: var(--muted);
      max-width: 28rem;
      margin-left: auto;
      margin-right: auto;
    }

    /* Mobile: stack · Desktop: side-by-side */
    .card-split {
      display: flex;
      flex-direction: column;
    }

    .col-qr {
      padding: clamp(1.15rem, 3vw, 1.75rem);
      text-align: center;
      background: #fafaf8;
    }

    .col-pay {
      padding: clamp(1.15rem, 3vw, 1.75rem);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0;
    }

    .eyebrow {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .qr-box {
      display: inline-block;
      padding: clamp(0.55rem, 2vw, 0.75rem);
      background: #fff;
      border: 2px solid var(--line);
      line-height: 0;
      box-shadow: 2px 2px 0 rgba(17, 17, 17, 0.12);
    }

    .qr-box img {
      display: block;
      width: 100%;
      height: auto;
      max-width: min(260px, 72vw);
      aspect-ratio: 1;
      object-fit: contain;
    }

    .qr-hint {
      margin-top: 0.75rem;
      font-size: 0.8125rem;
      color: var(--muted);
      max-width: 14rem;
      margin-left: auto;
      margin-right: auto;
    }

    .qr-fallback {
      display: none;
      font-size: 0.875rem;
      color: #a33;
      margin-top: 0.65rem;
    }
    .qr-fallback.show { display: block; }

    .pay-label {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.55rem;
    }

    .amounts {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-bottom: 0.75rem;
    }

    .chip {
      padding: 0.5rem 0.9rem;
      font: inherit;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--ink);
      background: var(--bg);
      border: 2px solid var(--line);
      transition: background 0.12s ease, color 0.12s ease;
    }
    .chip:hover { background: #eeece8; }
    .chip.on {
      background: var(--ink);
      color: #fff;
    }

    .amount-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.1rem;
    }

    .amount-row input {
      flex: 1;
      min-width: 0;
      padding: 0.65rem 0.8rem;
      font: inherit;
      font-size: 1rem;
      border: 2px solid var(--line);
      background: #fff;
    }
    .amount-row input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    .amount-row span {
      display: flex;
      align-items: center;
      padding: 0 0.25rem;
      font-size: 0.8125rem;
      font-weight: 700;
      color: var(--muted);
    }

    .pay-actions {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .tip-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      min-height: 3.25rem;
      padding: 0.9rem 1.15rem;
      font: inherit;
      font-size: clamp(0.9375rem, 2.5vw, 1.0625rem);
      font-weight: 700;
      text-decoration: none;
      color: #fff;
      background: var(--accent);
      border: 2px solid var(--line);
      box-shadow: 3px 3px 0 var(--line);
      transition: transform 0.1s ease, background 0.15s ease, box-shadow 0.1s ease;
      cursor: pointer;
    }
    .tip-btn:hover {
      background: var(--accent-hover);
      transform: translate(1px, 1px);
      box-shadow: 2px 2px 0 var(--line);
    }
    .tip-btn-card {
      background: var(--ink);
    }
    .tip-btn-card:hover {
      background: #2a2a2a;
    }

    .card-foot {
      padding: 0.85rem clamp(1.25rem, 4vw, 2rem);
      font-size: 0.8125rem;
      color: var(--muted);
      text-align: center;
      border-top: 2px dashed rgba(17, 17, 17, 0.14);
    }
    .card-foot strong { color: var(--ink); }

    @media (min-width: 52rem) {
      .topbar {
        margin-bottom: 1.75rem;
      }

      .upi-logo {
        max-width: 10.5rem;
      }

      .card-head {
        text-align: left;
      }

      .card-head p {
        margin-left: 0;
      }

      .card-split {
        flex-direction: row;
        align-items: stretch;
      }

      .col-qr {
        flex: 0 0 42%;
        max-width: 22rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-right: 2px dashed rgba(17, 17, 17, 0.14);
      }

      .col-pay {
        flex: 1;
        min-width: 0;
        padding: 1.75rem 2rem;
      }

      .qr-box img {
        max-width: 220px;
      }

      .qr-hint {
        max-width: 16rem;
      }

      .amounts {
        justify-content: flex-start;
      }
    }

    @media (max-width: 22rem) {
      .amounts {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
      }
      .amounts .chip:nth-child(4),
      .amounts .chip:nth-child(5) {
        grid-column: span 1;
      }
      .amounts .chip:first-child {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a class="back" href="index.html#support">← Back</a>
      <img class="upi-logo" src="images/upi-logo.png" width="1165" height="414" alt="UPI" />
    </header>

    <main class="card">
      <div class="card-head">
        <h1>Send a tip</h1>
        <p>Scan the QR on another device, or open your UPI app on this phone.</p>
      </div>

      <div class="card-split">
        <section class="col-qr" aria-label="Payment QR code">
          <p class="eyebrow">Scan to pay</p>
          <div class="qr-box">
            <img id="qr" width="240" height="240" alt="UPI payment QR code" />
          </div>
          <p class="qr-hint">Works with GPay, PhonePe, Paytm, BHIM, and other UPI apps</p>
          <p id="qr-err" class="qr-fallback">QR could not load — use the button to pay on this device.</p>
        </section>

        <section class="col-pay" aria-label="Tip amount and payment">
          <p class="pay-label">Choose amount (optional)</p>
          <div class="amounts" id="presets">
            <button type="button" class="chip on" data-amt="">Any</button>
            <button type="button" class="chip" data-amt="50">₹50</button>
            <button type="button" class="chip" data-amt="100">₹100</button>
            <button type="button" class="chip" data-amt="200">₹200</button>
            <button type="button" class="chip" data-amt="500">₹500</button>
          </div>
          <div class="amount-row">
            <input type="number" id="amount" min="1" max="100000" step="1" placeholder="Custom amount" inputmode="decimal" aria-label="Custom amount in rupees" />
            <span>INR</span>
          </div>

          <div class="pay-actions">
            <a class="tip-btn" id="tip-btn" href="#">Pay via UPI App</a>
            <a class="tip-btn tip-btn-card" id="card-btn" href="https://razorpay.me/@vyasdevgnakeyurkumar" target="_blank" rel="noopener noreferrer">Pay by Card</a>
          </div>
        </section>
      </div>

      <p class="card-foot">Payment note: <strong>TIP</strong></p>
    </main>
  </div>

  <script src="js/qrcode.min.js"></script>
  <script>
    (function () {
      var cfg = {
        vpa: "devgnavyas@slc",
        payeeName: "Devgna Vyas",
        defaultNote: "TIP",
        razorpayMe: "https://razorpay.me/@vyasdevgnakeyurkumar"
      };
      var presetAmt = "";
      var resizeTimer;

      function buildParams(amount) {
        var p = {
          pa: cfg.vpa,
          pn: cfg.payeeName,
          tn: cfg.defaultNote,
          cu: "INR"
        };
        var raw = amount != null ? String(amount).trim() : "";
        var n = parseFloat(raw);
        if (raw && !isNaN(n) && n > 0) {
          p.am = n.toFixed(2);
        }
        return p;
      }

      function toQuery(params) {
        return Object.keys(params)
          .filter(function (k) { return params[k] != null && params[k] !== ""; })
          .map(function (k) { return k + "=" + encodeURIComponent(String(params[k])); })
          .join("&");
      }

      function upiUri(amount) {
        return "upi://pay?" + toQuery(buildParams(amount));
      }

      function razorpayMeUri(amount) {
        var params = { description: cfg.defaultNote };
        var raw = amount != null ? String(amount).trim() : "";
        var n = parseFloat(raw);
        if (raw && !isNaN(n) && n > 0) {
          params.amount = String(Math.round(n * 100) / 100);
        }
        var q = toQuery(params);
        return cfg.razorpayMe + (q ? "?" + q : "");
      }

      function currentAmount() {
        var v = document.getElementById("amount").value.trim();
        return v || presetAmt;
      }

      function qrSize() {
        var desktop = window.matchMedia("(min-width: 52rem)").matches;
        if (desktop) return 220;
        var pad = 120;
        return Math.min(260, Math.max(200, window.innerWidth - pad));
      }

      function syncLinks() {
        var amt = currentAmount();
        document.getElementById("tip-btn").href = upiUri(amt);
        document.getElementById("card-btn").href = razorpayMeUri(amt);
      }

      function renderQr() {
        var img = document.getElementById("qr");
        var err = document.getElementById("qr-err");
        var payload = upiUri(currentAmount());
        var size = qrSize();

        function fail() {
          err.classList.add("show");
        }

        if (!window.QRCode) {
          fail();
          return;
        }

        QRCode.toDataURL(payload, {
          width: size,
          margin: 2,
          errorCorrectionLevel: "M",
          color: { dark: "#111111", light: "#ffffff" }
        }, function (e, url) {
          if (e) {
            fail();
            return;
          }
          err.classList.remove("show");
          img.src = url;
          img.width = size;
          img.height = size;
        });
      }

      function bind() {
        document.querySelectorAll(".chip").forEach(function (el) {
          el.addEventListener("click", function () {
            presetAmt = el.getAttribute("data-amt") || "";
            document.getElementById("amount").value = "";
            document.querySelectorAll(".chip").forEach(function (c) { c.classList.remove("on"); });
            el.classList.add("on");
            syncLinks();
            renderQr();
          });
        });

        document.getElementById("amount").addEventListener("input", function () {
          presetAmt = "";
          document.querySelectorAll(".chip").forEach(function (c) { c.classList.remove("on"); });
          syncLinks();
          renderQr();
        });

        syncLinks();
        renderQr();

        window.addEventListener("resize", function () {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(renderQr, 150);
        });
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", bind);
      } else {
        bind();
      }
    })();
  </script>
</body>
</html>
